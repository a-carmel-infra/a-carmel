<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header & Navigation -->
    <header class="header">
        <div class="container">
            <div class="nav-wrapper">
                <div class="logo">
                    <h1>CARMEL</h1>
                    <span class="logo-subtitle">בנייה ותשתיות</span>
                </div>
                <button class="mobile-menu-toggle" aria-label="Toggle menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <nav class="nav">
                    <a href="/" class="nav-link {% if page.url == '/' %}active{% endif %}">בית</a>
                    <a href="/about" class="nav-link {% if page.url == '/about/' %}active{% endif %}">אודות</a>
                    <a href="/contact" class="nav-link contact-btn {% if page.url == '/contact/' %}active{% endif %}">צור קשר</a>
                </nav>
            </div>
        </div>
    </header>

    {{ content }}

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h3>CARMEL</h3>
                    <p>בונים את העתיד יחד</p>
                </div>
                <div class="footer-section">
                    <h4>קישורים</h4>
                    <a href="/">בית</a>
                    <a href="/about">אודות</a>
                    <a href="/contact">צור קשר</a>
                </div>
                <div class="footer-section">
                    <h4>צור קשר</h4>
                    {% assign contact = site.data.site-info %}
                    <p>טלפון: {{ contact.phone }}</p>
                    <p>{{ contact.email }}</p>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2024 Carmel Construction. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="/script.js"></script>
</body>
</html>
