media: images/uploads

content:
  # Single page files
  - name: home
    label: Home Page
    type: file
    path: _data/pages/home.yml
    fields:
      - name: hero_title
        label: Hero Title
        type: string
      - name: hero_subtitle
        label: Hero Subtitle
        type: string
      - name: hero_description
        label: Description
        type: text
      - name: cta_text
        label: Button Text
        type: string

  - name: about
    label: About Page
    type: file
    path: _data/pages/about.yml
    fields:
      - name: title
        label: Title
        type: string
      - name: subtitle
        label: Subtitle
        type: string
      - name: story_title
        label: Story Title
        type: string
      - name: content
        label: Content
        type: text

  - name: contact
    label: Contact Page
    type: file
    path: _data/pages/contact.yml
    fields:
      - name: title
        label: Title
        type: string
      - name: subtitle
        label: Subtitle
        type: string
      - name: address
        label: Address
        type: text
      - name: phone_main
        label: Phone
        type: string
      - name: phone_mobile
        label: Mobile
        type: string
      - name: email_main
        label: Email
        type: string
      - name: hours
        label: Hours
        type: string

  # Collections
  - name: projects
    label: Projects
    type: collection
    path: _projects
    fields:
      - name: title
        label: Project Title
        type: string
      - name: category
        label: Category
        type: string
      - name: description
        label: Description
        type: text
      - name: image
        label: Image
        type: image
      - name: status
        label: Status
        type: string
      - name: date
        label: Date
        type: date
      - name: location
        label: Location
        type: string

  - name: team
    label: Team Members
    type: collection
    path: _team
    fields:
      - name: name
        label: Name
        type: string
      - name: role
        label: Role
        type: string
      - name: description
        label: Description
        type: text
      - name: image
        label: Photo
        type: image
      - name: email
        label: Email
        type: string
      - name: phone
        label: Phone
        type: string
      - name: order
        label: Display Order
        type: number
