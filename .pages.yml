title: Carmel Construction
description: מערכת ניהול תוכן לאתר כרמל בנייה ותשתיות

media:
  input: images
  output: images/uploads

collections:
  - name: projects
    label: פרויקטים
    path: content/projects
    view:
      fields:
        - title
        - category
        - status
    fields:
      - name: title
        label: שם הפרויקט
        type: string
      - name: category
        label: קטגוריה
        type: select
        options:
          - value: infrastructure
            label: תשתיות
          - value: towers
            label: מגדלים
          - value: residential
            label: בתים פרטיים
          - value: industrial
            label: תעשייה
      - name: description
        label: תיאור
        type: rich-text
      - name: image
        label: תמונה
        type: image
      - name: status
        label: סטטוס
        type: select
        options:
          - value: in-progress
            label: בביצוע
          - value: completed
            label: הושלם
      - name: date
        label: תאריך
        type: date
      - name: location
        label: מיקום
        type: string

  - name: team
    label: חברי צוות
    path: content/team
    view:
      fields:
        - name
        - role
    fields:
      - name: name
        label: שם
        type: string
      - name: role
        label: תפקיד
        type: string
      - name: description
        label: תיאור
        type: rich-text
      - name: image
        label: תמונה
        type: image
      - name: email
        label: אימייל
        type: string
      - name: phone
        label: טלפון
        type: string
      - name: order
        label: סדר תצוגה
        type: number
